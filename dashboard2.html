<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tableau de bord — Timonia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
.lora{font-family:'Lora',serif;}
:root{
  --bg:#f7f8fc;--surf:#fff;--surf2:#f0f3fb;--surf3:#e6eaf7;
  --border:rgba(15,30,80,0.08);--text:#0d1829;--muted:#8494b8;
  --accent:#1e63f0;--accentL:rgba(30,99,240,0.08);--accentM:rgba(30,99,240,0.16);
  --teal:#0ba592;--tealL:rgba(11,165,146,0.09);
  --gold:#d08600;--goldL:rgba(208,134,0,0.09);
  --green:#16a34a;--greenL:rgba(22,163,74,0.09);
  --red:#e02424;--redL:rgba(224,36,36,0.08);
  --purple:#7c3aed;--purpleL:rgba(124,58,237,0.08);
  --shadow:rgba(0,0,0,0.06);--nav-bg:rgba(247,248,252,0.93);
}
body.dark{
  --bg:#08111e;--surf:#101826;--surf2:#19243a;--surf3:#212d45;
  --border:rgba(255,255,255,0.07);--text:#dde4f8;--muted:#4e6080;
  --accentL:rgba(30,99,240,0.16);--accentM:rgba(30,99,240,0.26);
  --tealL:rgba(11,165,146,0.16);--goldL:rgba(208,134,0,0.16);
  --greenL:rgba(22,163,74,0.14);--redL:rgba(224,36,36,0.14);
  --purpleL:rgba(124,58,237,0.16);
  --shadow:rgba(0,0,0,0.35);--nav-bg:rgba(8,17,30,0.93);
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .32s cubic-bezier(.22,1,.36,1);}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(22px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
