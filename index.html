<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timonia | Accompagnement Immobilier Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme"> <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><strong>Timonia</strong></div>
            <div class="nav-links">
                <a href="#salarie">Salariés</a>
                <a href="#entreprise">Entreprises</a>
                <button id="theme-toggle">🌙</button>
                <button class="btn-main">Prendre RDV</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <div class="badge">VOTRE PROJET IMMOBILIER SIMPLIFIÉ</div>
            <h1>Achetez, rénovez, louez — <br><span class="accent">sans vous noyer.</span></h1>
            <p>Un expert vous accompagne à chaque étape. Pour Veolia, le premier appel est offert.</p>
            
            <div class="search-box">
                <label>🔍 MON ENTREPRISE EST-ELLE ADHÉRENTE ?</label>
                <div class="input-group">
                    <input type="text" id="company-input" placeholder="Ex: Veolia, EDF...">
                    <button class="btn-main" onclick="checkCompany()">Vérifier</button>
                </div>
                <div id="result-msg"></div>
            </div>
        </div>
    </header>

    <script src="js/app.js"></script>
</body>
</html>
